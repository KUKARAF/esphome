alias: "ePaper Midnight Reset"
description: >
  Resets daily counters, clears todo items, and checks the Ordnung calendar
  for a 'date night' event to set the heart indicator on the e-paper display.
trigger:
  - platform: time
    at: "00:01:00"
  - platform: homeassistant
    event: start
action:
  - service: calendar.get_events
    target:
      entity_id: calendar.ordnung
    data:
      start_date_time: "{{ now().strftime('%Y-%m-%d') }} 00:00:00"
      end_date_time: "{{ now().strftime('%Y-%m-%d') }} 23:59:59"
    response_variable: events
  - variables:
      date_night_found: >
        {{ events['calendar.ordnung'].events
           | selectattr('summary', 'equalto', 'date night')
           | list | count > 0 }}
  - if:
      - condition: template
        value_template: "{{ date_night_found }}"
    then:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.date_night_today
    else:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.date_night_today
  - service: input_number.set_value
    target:
      entity_id:
        - input_number.epaper_distractions
        - input_number.epaper_pomodoros
    data:
      value: 0
  - service: input_text.set_value
    target:
      entity_id:
        - input_text.epaper_todo_1
        - input_text.epaper_todo_2
        - input_text.epaper_todo_3
        - input_text.epaper_todo_4
        - input_text.epaper_todo_5
        - input_text.epaper_todo_6
        - input_text.epaper_todo_7
    data:
      value: ""
mode: single
