substitutions:
  device_name: "ESP32 Matrix Display"
  friendly_name: "ESP32 Matrix Display"

esphome:
  name: esp32-matrix-display
  friendly_name: "${friendly_name}"

esp32:
  board: nodemcu-32s
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  platform: esphome
  password: !secret ota_password

logger:

# SPI configuration for MAX7219
spi:
  clk_pin: GPIO21   # CLK
  mosi_pin: GPIO18  # DIN

# Font for the display (download from https://www.dafont.com/pixelmix.font)
font:
  - file: "fonts/pixelmix.ttf"
    id: matrix_font
    size: 8
    glyphs: "!\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~ °"

# Text sensor to read the text to show from Home Assistant
text_sensor:
  - platform: homeassistant
    name: "Display Text"
    entity_id: input_text.matrix_display_text
    id: display_text

# Number input for brightness control
number:
  - platform: template
    name: "${device_name} Brightness"
    id: display_brightness
    min_value: 0
    max_value: 15
    step: 1
    initial_value: 10
    optimistic: true
    set_action:
      - lambda: 'id(led_matrix).set_intensity(x);'

# MAX7219 Display configuration
display:
  - platform: max7219digit
    cs_pin: GPIO19    # CS
    num_chips: 4
    intensity: 1
    id: led_matrix
    lambda: |-
      it.printf(0, 0, id(matrix_font), "%s", id(display_text).has_state() ? id(display_text).state.c_str() : "hi there :)");

