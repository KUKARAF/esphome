substitutions:
  device_name: "Kitchen Lights"
  friendly_name: "Kitchen Lights"
  switch_pin: GPIO14

esphome:
  name: kitchen-lights
  friendly_name: "${friendly_name}"

esp32:
  board: nodemcu-32s
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  platform: esphome
  password: !secret ota_password

logger:

# PWM outputs driving MOSFETs for 12V light sets
output:
  - platform: ledc
    pin: GPIO4
    id: pwm_light_1
    frequency: 1000 Hz

  - platform: ledc
    pin: GPIO16
    id: pwm_light_2
    frequency: 1000 Hz

light:
  - platform: monochromatic
    id: light_small
    name: "Small Lights"
    output: pwm_light_1
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: monochromatic
    id: light_big
    name: "Big Lights"
    output: pwm_light_2
    restore_mode: RESTORE_DEFAULT_OFF

binary_sensor:
  - platform: gpio
    pin:
      number: "${switch_pin}"
      mode: INPUT_PULLUP
      inverted: true
    name: "Stove Switch"
    on_press:
      then:
        - light.turn_on: light_big
    on_release:
      then:
        - light.turn_off: light_big

status_led:
  pin:
    number: GPIO2
    inverted: true
