substitutions:
  device_name: "Phone Ring Button"
  friendly_name: "Phone Ring Button"
  onloc_device_id: "1"

esphome:
  name: phone-ring-button
  friendly_name: "${friendly_name}"

esp32:
  board: nodemcu-32s
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  platform: esphome
  password: !secret ota_password

logger:

http_request:
  useragent: esphome/phone-ring-button
  timeout: 10s

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Ring Phone"
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - http_request.post:
            url: "https://timeline.osmosis.page/api/devices/${onloc_device_id}/ring"
            request_headers:
              Authorization: !secret onloc_api_key
            on_response:
              then:
                - logger.log:
                    format: "Ring response: %d"
                    args: [response->status_code]

status_led:
  pin:
    number: GPIO2
    inverted: true
