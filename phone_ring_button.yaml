substitutions:
  device_name: "Phone Ring Button"
  friendly_name: "Phone Ring Button"
  onloc_device_id: "1"

esphome:
  name: phone-ring-button
  friendly_name: "${friendly_name}"
  on_boot:
    priority: -100
    then:
      - http_request.get:
          url: "https://kv.osmosis.page/kv/ONLOC_API_KEY"
          headers:
            X-API-Key: !secret kv_api_key
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    id(onloc_api_key) = body;
                    ESP_LOGI("ring", "ONLOC API key fetched OK");
                  } else {
                    ESP_LOGE("ring", "Failed to fetch ONLOC API key: %d", response->status_code);
                  }

esp32:
  board: nodemcu-32s
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  platform: esphome
  password: !secret ota_password

logger:

globals:
  - id: onloc_api_key
    type: std::string
    restore_value: false
    initial_value: '""'

http_request:
  useragent: esphome/phone-ring-button
  timeout: 10s

# Button on GPIO0 (boot button on NodeMCU) — change pin as needed
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Ring Phone"
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - http_request.post:
            url: "https://timeline.osmosis.page/api/devices/${onloc_device_id}/ring"
            headers:
              Authorization: !lambda return "Bearer " + id(onloc_api_key);
            on_response:
              then:
                - logger.log:
                    format: "Ring response: %d"
                    args: [response->status_code]

status_led:
  pin:
    number: GPIO2
    inverted: true
