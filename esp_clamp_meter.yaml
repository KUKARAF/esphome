esphome:
  name: esp32s3-ct-monitor
  friendly_name: ESP32-S3 CT Monitor

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  ap:
    ssid: "ESP32-S3-CT Fallback"
    password: !secret ap_password

captive_portal:

# CT Clamp Configuration - following official docs
sensor:
  # ADC sensor for CT clamp
  # Connect CT clamp to GPIO1 (positive) and GND (negative)
  - platform: adc
    pin: GPIO1
    id: adc_sensor
    attenuation: 11db
    update_interval: never
    
  # CT Clamp sensor
  - platform: ct_clamp
    sensor: adc_sensor
    name: "Measured Current"
    update_interval: 60s
    filters:
      - calibrate_linear:
          # Measured value of 0 maps to 0A
          - 0 -> 0
          # Known load: you need to calibrate this
          # Example: if you have a 10A device and it shows 0.067 in logs:
          # - 0.067 -> 10.0
