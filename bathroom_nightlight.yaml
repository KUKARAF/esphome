substitutions:
  device_name: "Bathroom Nightlight"
  friendly_name: "Bathroom Nightlight"

esphome:
  name: bathroom-nightlight
  friendly_name: "${friendly_name}"

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_password

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

output:
  - platform: ledc
    pin: GPIO16
    id: pwm_output

light:
  - platform: monochromatic
    output: pwm_output
    name: "Bathroom Nightlight"
    id: nightlight

sensor:
  - platform: adc
    pin: GPIO34
    id: ntc_source
    update_interval: 10s
    attenuation: 12db

  - platform: resistance
    id: ntc_resistance
    sensor: ntc_source
    configuration: DOWNSTREAM
    resistor: 10kOhm

  - platform: ntc
    sensor: ntc_resistance
    name: "Bathroom Temperature"
    calibration:
      b_constant: 3661
      reference_resistance: 10kOhm
      reference_temperature: 25°C
